<app-auth-card>
    <h2 class="text-brand-sapphire " style="text-align: center; margin-bottom: 1.5rem;">Login</h2>
    <form>
        <div class="form-group">
            <label>Username</label>
            <input type="text" placeholder="seu-username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary">Login</button>
    </form>

    <p style="text-align: center; margin-top: 1rem;">
        Não tem conta ainda? Se torne um novo desafiante! <a routerLink="/register">Registrar</a>
    </p>
</app-auth-card>
